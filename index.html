<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialRolo | Simple. Secure. Yours.</title>
    <style>
        :root { 
            --bg: #F2F2F7; /* 앱 메인 배경색 */
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --primary: #334155; /* Deep Slate */
            --accent: #FF5722; /* Liquid Orange 포인트 */
            --text-main: #1C1C1E; 
            --text-dim: #64748B; 
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* 배경 장식: 은은한 슬레이트 글로우 */
        .glow { 
            position: absolute; 
            top: 20%; 
            right: 10%; 
            width: 500px; 
            height: 500px; 
            background: radial-gradient(circle, rgba(51, 65, 85, 0.07) 0%, transparent 70%); 
            filter: blur(100px); 
            z-index: -1; 
        }

        .container { 
            position: relative; 
            z-index: 1; 
            text-align: center; 
            padding: 4rem 2rem; 
            max-width: 700px; 
        }

        /* 타이틀: 슬레이트 그라데이션 */
        h1 { 
            font-size: 4rem; 
            font-weight: 950; 
            margin-bottom: 0.5rem; 
            letter-spacing: -0.06em; 
            background: linear-gradient(135deg, var(--primary), #0F172A); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin-bottom: 4rem;
            font-weight: 700;
        }

        .feature-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 1.5rem; 
            text-align: left; 
        }

        .card {

            background: var(--card-bg); 
            backdrop-filter: blur(30px) saturate(160%); 
            -webkit-backdrop-filter: blur(30px) saturate(160%);
