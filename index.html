<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DialRolo | Simple. Secure. Yours.</title>
    <style>
        :root { 
            --bg: #F2F2F7; /* 앱 배경색 적용 */
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --primary: #334155; /* Slate Gray */
            --accent: #FF5722; /* Liquid Orange */
            --text-main: #1C1C1E; 
            --text-dim: #64748B; 
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden;
        }

        .glow { 
            position: absolute; 
            top: 20%; 
            right: 10%; 
            width: 500px; 
            height: 500px; 
            background: radial-gradient(circle, rgba(51, 65, 85, 0.07) 0%, transparent 70%); 
            filter: blur(100px); 
            z-index: -1; 
        }

        .container { 
            position: relative; 
            z-index: 1; 
            text-align: center; 
            padding: 4rem 2rem; 
            max-width: 700px; 
        }

        h1 { 
            font-size: 3.5rem; 
            font-weight: 900; 
            margin-bottom: 0.5rem; 
            letter-spacing: -0.06em; 
            color: var(--primary);
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin-bottom: 4rem;
            font-weight: 700;
        }

        .feature-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 1.5rem; 
            text-align: left; 
        }

        .card { 
            padding: 2rem; 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border); 
            border-radius: 32px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.9);
        }

        .card h3 { 
            margin: 0 0 0.8rem 0; 
            font-size: 1.3rem; 
            color: var(--primary); 
            font-weight: 800;
        }

        .card p { 
            margin: 0; 
            font-size: 1.05rem; 
            color: #475569; 
            line-height: 1.7; 
        }

        .highlight { 
            color: var(--accent); 
            font-weight: 700; 
        }

        .links { 
            margin-top: 5rem; 
        }

        a { 
            color: var(--text-dim); 
            text-decoration: none; 
            font-size: 0.95rem; 
            font-weight: 600;
        }

        a:hover { 
            color: var(--primary); 
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <h1>DialRolo</h1>
        <p class="tagline">Archive. Filter. Control.</p>
        
        <div class="feature-grid">
            <div class="card">
                <h3>Archive Every Record</h3>
                <p>통화 기록 한계를 넘어 모든 연결을 안전하게 저장하세요. <span class="highlight">2,000건의 제한</span> 없이 관계의 기록을 영구히 보존합니다.</p>
            </div>
            <div class="card">
                <h3>Intentional Local-First</h3>
                <p>의도적으로 서버를 운영하지 않습니다. <span class="highlight">Zero-Server</span> 설계를 통해 모든 기록은 오직 기기 안에서만 존재합니다.</p>
            </div>
        </div>

        <div class="links">
            <a href="privacy.html">Privacy Policy (EN / KR)</a>
        </div>
    </div>
</body>
</html>
